version: "1"
name: get_customer_profile
enabled: true

inputs:
  - name: user_id
    type: string
    required: true
    description: "מזהה המשתמש (לדוגמה: 'user_new', 'user_member', 'user_business')"

triggers:
  - type: manual

steps:
  - name: call_crm_mcp
    type: http
    with:
      url: "http://host-1:8002/mcp"
      method: POST
      headers:
        Content-Type: application/json
      body: |
        {
          "jsonrpc": "2.0",
          "method": "tools/call",
          "params": {
            "name": "get_customer_profile_tool",
            "arguments": {
              "user_id": "{{ inputs.user_id }}"
            }
          },
          "id": "{{ execution.id }}"
        }
    on-failure:
      retry:
        max-attempts: 2
        delay: 1s

  - name: log_profile
    type: console
    with:
      message: |
        פרופיל לקוח עבור {{ inputs.user_id }}:
        שם: {{ steps.call_crm_mcp.output.data.result.name }}
        רמת נאמנות: {{ steps.call_crm_mcp.output.data.result.loyalty_tier }}
        ערך לקוח: ₪{{ steps.call_crm_mcp.output.data.result.lifetime_value }}
        היסטוריית רכישות: {{ steps.call_crm_mcp.output.data.result.purchase_history | size }} פריטים


