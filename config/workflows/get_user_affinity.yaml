version: "1"
name: get_user_affinity
enabled: true

inputs:
  - name: user_id
    type: string
    required: true
    description: "מזהה המשתמש"

triggers:
  - type: manual

steps:
  - name: query_affinity
    type: elasticsearch.esql.query
    with:
      query: >
        FROM user-clickstream
        | WHERE user_id == "{{ inputs.user_id }}"
        | WHERE meta_tags IS NOT NULL
        | EVAL tag = TO_STRING(meta_tags)
        | STATS count = COUNT(*) BY tag
        | SORT count DESC
        | LIMIT 3

  - name: log_affinity
    type: console
    with:
      message: |
        ניתוח העדפות עבור {{ inputs.user_id }}:
        העדפות מובילות:
        {% if steps.query_affinity.output.values %}
        {% for row in steps.query_affinity.output.values %}
        - {{ row.0 }}: {{ row.1 }} צפיות
        {% endfor %}
        {% else %}
        אין נתוני העדפות זמינים
        {% endif %}


