version: "1"
name: check_trip_safety
enabled: true

inputs:
  - name: location
    type: string
    required: true
    description: "יעד הטיול (לדוגמה: 'מכתש רמון', 'חרמון', 'Yosemite')"
  - name: dates
    type: string
    required: true
    description: "טווח תאריכים או תאריך מסוים (לדוגמה: '2024-01-15', 'ינואר 15-20, 2024')"

triggers:
  - type: manual

steps:
  - name: call_weather_mcp
    type: http
    with:
      url: "http://host-1:8002/mcp"
      method: POST
      headers:
        Content-Type: application/json
      body: |
        {
          "jsonrpc": "2.0",
          "method": "tools/call",
          "params": {
            "name": "get_trip_conditions_tool",
            "arguments": {
              "location": "{{ inputs.location }}",
              "dates": "{{ inputs.dates }}"
            }
          },
          "id": "{{ execution.id }}"
        }
    on-failure:
      retry:
        max-attempts: 2
        delay: 1s

  - name: parse_response
    type: console
    with:
      message: |
        תנאי טיול עבור {{ inputs.location }}:
        מזג אוויר: {{ steps.call_weather_mcp.output.data.result.weather }}
        טמפרטורה: {{ steps.call_weather_mcp.output.data.result.min_temp_c }}°C - {{ steps.call_weather_mcp.output.data.result.max_temp_c }}°C
        התראת דרכים: {{ steps.call_weather_mcp.output.data.result.road_alert }}
        המלצות:
        {% for rec in steps.call_weather_mcp.output.data.result.recommendations %}
        - {{ rec }}
        {% endfor %}


